name: Feature request
description: Suggest an improvement to the deploy stack or documentation
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Try to describe the **problem** first and the **proposal** second — the clearer the problem statement, the easier it is to evaluate alternative solutions.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's in the way?
      placeholder: |
        I want to deploy DFZ behind an existing reverse proxy (Traefik), but the
        default docker-compose.yml binds the UI port directly and there's no
        documented way to disable that.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What do you want DFZ to do instead? Concrete suggestions are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they didn't fit.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, etc.
