# ========================================
# DFZ — Production Deployment
# Kubernetes & Docker management dashboard
# ========================================
#
# Quick start:
#   docker compose pull
#   docker compose up -d
#   open http://localhost:3080
#
# First-run setup:
#   The first time you open the UI, you'll be prompted to create
#   the admin account (username and password). There is no default
#   password to fall back on — pick something strong.
#
# Configuration:
#   All tunables have sensible defaults baked into this file via
#   ${VAR:-default} substitution. To change a value, edit the line
#   directly below and run `docker compose up -d`.
#
#   Common overrides (search for the variable name):
#     APP_URL           External URL the dashboard is served at (CORS + cookies)
#     UI_PORT           Host port mapping for the UI (container listens on 3000)
#     TAG / REGISTRY    Pin to a specific image version (per service image: line)
#     SECURE_COOKIES    Set to true when serving over HTTPS
#     COOKIE_SAMESITE   strict | lax | none (none requires SECURE_COOKIES=true)
#     LOG_LEVEL         DEBUG | INFO | WARNING | ERROR
#
#   Advanced knobs (feature flags, pool sizing, informer tuning,
#   rollback playbook): docs/ADVANCED.md
#
# Security model:
#   PostgreSQL uses trust auth on the internal Docker network only.
#   The PG port is never exposed to the host. Role separation
#   (dfz_backend / dfz_terminal) enforces schema-level least-privilege.
#   Override by adding PG_PASSWORD to the postgres service environment
#   block below to enable password auth.
#
# Every backend feature flag defaults to ON in the image. To roll back
# a specific subsystem (e.g. USE_REDIS_CACHE=false), add it to the
# backend service `environment:` block below and run `docker compose up -d`.
# Full catalog: docs/ADVANCED.md
#

services:
  # ========================================
  # Backend — FastAPI (stateless, multi-worker)
  # ========================================
  backend:
    image: ${REGISTRY:-ghcr.io/devopsfromzero}/dfz-backend:${TAG:-latest}
    pull_policy: always
    container_name: dfz-backend
    restart: unless-stopped

    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}

      # Tokens + cookies
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - ALGORITHM=HS256
      - ENABLE_TOKEN_ROTATION=${ENABLE_TOKEN_ROTATION:-false}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}

      # CORS — must match the URL the browser uses
      - CORS_ALLOWED_ORIGINS=${APP_URL:-http://localhost:3080}

      # PostgreSQL (internal network, trust auth)
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=dfz
      - PG_POOL_MIN_SIZE=${PG_POOL_MIN_SIZE:-2}
      - PG_POOL_MAX_SIZE=${PG_POOL_MAX_SIZE:-20}

      # Redis (falls back to in-memory if unreachable)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-50}

      # Resource tuning
      - THREAD_POOL_MAX_WORKERS=${THREAD_POOL_MAX_WORKERS:-64}
      - INFORMER_PROCESS_SOFT_LIMIT_MB=${INFORMER_PROCESS_SOFT_LIMIT_MB:-1500}
      - INFORMER_PROCESS_HARD_LIMIT_MB=${INFORMER_PROCESS_HARD_LIMIT_MB:-2000}

    volumes:
      - backend-secrets:/app/data

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - dfz-network

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ========================================
  # Terminal — stateful exec/SSH sessions (single-worker)
  # ========================================
  terminal:
    image: ${REGISTRY:-ghcr.io/devopsfromzero}/dfz-terminal:${TAG:-latest}
    pull_policy: always
    container_name: dfz-terminal
    restart: unless-stopped

    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - ALGORITHM=HS256
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
      - CORS_ALLOWED_ORIGINS=${APP_URL:-http://localhost:3080}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=dfz

    volumes:
      - backend-secrets:/app/data:ro

    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

    networks:
      - dfz-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ========================================
  # UI — Next.js frontend
  # ========================================
  ui:
    image: ${REGISTRY:-ghcr.io/devopsfromzero}/dfz-ui:${TAG:-latest}
    pull_policy: always
    container_name: dfz-ui
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
      - TERMINAL_BACKEND_URL=http://terminal:8001
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}

    ports:
      - "${UI_PORT:-3080}:3000"

    networks:
      - dfz-network

    depends_on:
      backend:
        condition: service_healthy
      terminal:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # PostgreSQL — persistent store
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: dfz-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: dfz
      POSTGRES_USER: dfz
      POSTGRES_HOST_AUTH_METHOD: trust

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - dfz-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dfz -d dfz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Redis — cache (not load-bearing)
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: dfz-redis
    restart: unless-stopped

    command:
      - "redis-server"
      - "--maxmemory"
      - "${REDIS_MAXMEMORY:-2gb}"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""
      - "--appendonly"
      - "no"
      - "--tcp-keepalive"
      - "60"

    volumes:
      - redis-data:/data

    networks:
      - dfz-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2560M
        reservations:
          cpus: '0.25'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dfz-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  backend-secrets:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
